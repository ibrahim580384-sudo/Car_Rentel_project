<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f6fa;
}

.form-container{
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.btn-rent{
background:#2c3e50;
color:#fff;
}

.btn-rent:hover{
background:#1a252f;
}

</style>

</head>

<body class="py-5">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="form-container">

<h2 class="text-center fw-bold mb-4">Verification Form</h2>

<form action="upload.php" method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">National ID Number</label>
<input 
type="text"
name="national_id"
class="form-control"
placeholder="Enter your 14 digits ID"
maxlength="14"
required>
</div>

<div class="mb-3">
<label class="form-label">ID Front Side Image</label>
<input 
type="file"
name="id_front"
class="form-control"
accept="image/*"
required>
</div>

<div class="mb-3">
<label class="form-label">ID Back Side Image</label>
<input 
type="file"
name="id_back"
class="form-control"
accept="image/*"
required>
</div>

<div class="mb-3">
<label class="form-label">Driving License (Front)</label>
<input 
type="file"
name="license_front"
class="form-control"
accept="image/*">
</div>

<div class="mb-3">
<label class="form-label">Driving License (Back)</label>
<input 
type="file"
name="license_back"
class="form-control"
accept="image/*">
</div>

<div class="mb-4">
<label class="form-label">Additional Attachment</label>
<input 
type="file"
name="attachment"
class="form-control">
</div>

<button type="submit" class="btn btn-rent w-100">
Submit Verification
</button>

<a href="index.html" class="d-block text-center mt-3 text-muted">
Back to Cars
</a>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
